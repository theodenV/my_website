<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Написать пост</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg bg-white shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">Мой сайт</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="#">Профиль</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Посты</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Написать пост</a></li>
                    <li class="nav-item"><a class="nav-link text-danger" href="#">Выйти</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">

                <div class="text-center mb-4">
                    <h2>Создать новый пост</h2>
                    <p class="text-muted">Поделитесь своими мыслями и идеями</p>
                </div>

                <div class="card shadow-sm">
                    <div class="card-body p-4">
                        <form>
                            <div class="mb-3">
                                <label for="title" class="form-label fw-bold">Название поста</label>
                                <input type="text" class="form-control" id="title" placeholder="Введите заголовок">
                            </div>
                            <div class="mb-4">
                                <label for="content" class="form-label fw-bold">Текст поста</label>
                                <textarea class="form-control" id="content" rows="6" placeholder="Напишите что-нибудь..."></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 py-2">Опубликовать</button>
                        </form>
                    </div>
                </div>

            </div>
        </div>
    </div>

</body>
</html>
